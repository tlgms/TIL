name: TIL Sync

on:
  schedule:
    - cron: "50 14 * * *"  # 23:50 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync Notion -> Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/notion_til_sync.py
      - name: Commit and push
        run: |
          git config user.name "TIL Sync"
          git config user.email "siheun9@gmail.com"
          git add -A
          git diff --cached --quiet || { git commit -m "TIL sync: $(TZ=Asia/Seoul date +%F)"; git push; }
